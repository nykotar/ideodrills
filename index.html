<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
        <link rel="stylesheet" href="style.css">
        
        <title>Ideogram Drill</title>
    </head>
    <body>

        <header>
            <nav class="navbar-fixed">
                <div class="nav-wrapper">
                    <div class="container">
                        <a href="#" class="brand-logo">
                        Ideogram Drill
                        <br>
                        <span class="small">made with ❤ by /u/nykotar</span>
                        </a>

                        
                        <ul id="nav-mobile" class="right hide-on-med-and-down">
                        <li><a href="https://reddit.com/r/remoteviewing">Reddit</a></li>
                        <li><a href="https://github.com/nykotar/ideodrills">GitHub</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main>
        <div class="valign-wrapper" style="width:100%;height:100%;position: absolute;">
                <div class="valign" style="width:100%;">
                    <div class="container">
                       <div class="row">
                          <div class="col s12 m6 offset-m3">
                                <div class="card">
                                    <div class="card-content">
                                        <span class="card-title black-text">Ideograms</span>
                                        <div class="row">
                                            <div class="col s6">
                                                <p>
                                                    <label>
                                                        <input type="checkbox" name="ideogram" value="Water" checked="checked"/>
                                                        <span>Water</span>
                                                    </label>
                                                </p>
                                                <p>
                                                    <label>
                                                        <input type="checkbox" name="ideogram" value="Organic" checked="checked"/>
                                                        <span>Organic</span>
                                                    </label>
                                                </p>
                                                <p>
                                                    <label>
                                                        <input type="checkbox" name="ideogram" value="Natural" checked="checked"/>
                                                        <span>Natural</span>
                                                    </label>
                                                </p>
                                                <p>
                                                    <label>
                                                        <input type="checkbox" name="ideogram" value="Structure" checked="checked"/>
                                                        <span>Structure</span>
                                                    </label>
                                                </p>
                                            </div>
                                            <div class="col s6" id="ideogram-chips">
                                                <div class="chips chips-placeholder"></div>
                                            </div>
                                        </div>
                                        <span class="card-title black-text">Settings</span>
                                        <div class="row">
                                            <div class="input-field col s3" id="lang">
                                                <select>
                                                </select>
                                                <label>Language</label>
                                            </div>
                                            <div class="input-field col s3" id="speed">
                                                <select>
                                                    <option value="3">Slow</option>
                                                    <option value="2" selected>Medium</option>
                                                    <option value="1.5">Fast</option>
                                                </select>                        
                                                <label>Speed</label>
                                            </div>
                                            <div class="col s5">
                                                <label>Timer (minutes)</label>
                                                <p class="range-field">
                                                    <input type="range" id="timer" min="1" max="15" value="5"/>
                                                </p>
                                            </div> 
                                        </div>
                                        <div class="row">
                                            <h1 class="center-align scale-transition scale-out" id="countdown" style="display:none">0:00</h1>
                                        </div>
                                    </div>
                                    <div class="card-action">
                                        <button type="button" class="btn waves-effect waves-light scale-transition" id="startBtn" onclick="start()">Start<i class="material-icons right">send</i></button>
                                        <button type="button" class="btn waves-effect waves-light scale-transition scale-out red darken-1" id="stopBtn" onclick="stop()">Stop<i class="material-icons right">stop</i></button>
                                    </div>
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </main>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
