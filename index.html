<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
        <link rel="stylesheet" href="style.css">
        
        <title>Ideogram Drill</title>
    </head>
    <body>

        <nav>
            <div class="nav-wrapper">
                <a href="#" class="brand-logo"> Ideogram Drill</a>
            </div>
        </nav>

        <div class="valign-wrapper" style="width:100%;height:100%;position: absolute;">
                <div class="valign" style="width:100%;">
                    <div class="container">
                       <div class="row">
                          <div class="col s12 m6 offset-m3">
                             <div class="card">
                                <div class="card-content">
                                   <span class="card-title black-text">Ideograms</span>
                                    <div class="row">
                                        <div class="col s6">
                                            <p>
                                                <label>
                                                    <input type="checkbox" name="ideogram" value="Water" checked="checked"/>
                                                    <span>Water</span>
                                                </label>
                                            </p>
                                            <p>
                                                <label>
                                                    <input type="checkbox" name="ideogram" value="Organic" checked="checked"/>
                                                    <span>Organic</span>
                                                </label>
                                            </p>
                                            <p>
                                                <label>
                                                    <input type="checkbox" name="ideogram" value="Natural" checked="checked"/>
                                                    <span>Natural</span>
                                                </label>
                                            </p>
                                            <p>
                                                <label>
                                                    <input type="checkbox" name="ideogram" value="Structure" checked="checked"/>
                                                    <span>Structure</span>
                                                </label>
                                            </p>
                                        </div>
                                        <div class="col s6" id="ideogram-chips">
                                               <div class="chips chips-placeholder"></div>
                                        </div>
                                    </div>
                                    <span class="card-title black-text">Configuration</span>
                                    <div class="row">
                                        <div class="input-field col s3">
                                            <select>
                                            </select>
                                            <label>Language</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-action">
                                   <button type="button" class="btn" onclick="start()">Start</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
